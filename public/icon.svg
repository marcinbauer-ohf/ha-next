<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="96" fill="#18BCF2"/>
  <g transform="translate(106, 106)">
    <!-- House outline -->
    <path d="M150 50 L50 130 L50 280 L250 280 L250 130 Z" fill="none" stroke="white" stroke-width="20" stroke-linejoin="miter"/>
    
    <!-- Circuit pattern inside -->
    <!-- Center vertical line -->
    <line x1="150" y1="160" x2="150" y2="240" stroke="white" stroke-width="12"/>
    
    <!-- Left branch -->
    <line x1="150" y1="180" x2="100" y2="200" stroke="white" stroke-width="12"/>
    <circle cx="100" cy="200" r="16" fill="white"/>
    
    <!-- Right branch -->
    <line x1="150" y1="180" x2="200" y2="200" stroke="white" stroke-width="12"/>
    <circle cx="200" cy="200" r="16" fill="white"/>
    
    <!-- Top node -->
    <circle cx="150" cy="160" r="16" fill="white"/>
  </g>
</svg>
